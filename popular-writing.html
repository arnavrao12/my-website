<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popular Writing | Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; line-height: 1.7; color: #2D3748; background-color: #FAF9F6; margin: 0; }
        
        nav { padding: 60px 80px 40px 80px; display: flex; flex-wrap: wrap; border-bottom: 1px solid #E2E8F0; }
        nav a { margin-right: 40px; margin-bottom: 10px; text-decoration: none; color: #718096; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; }
        .active { color: #1A202C !important; border-bottom: 2px solid #9C4221; padding-bottom: 8px; }

        main { max-width: 900px; margin: 0 auto; padding: 60px 40px 100px 40px; }
        
        h1 { font-family: 'Lora', serif; font-size: 2.5rem; font-weight: 600; margin-bottom: 60px; color: #1A202C; text-align: left; }

        .writing-entry { 
            margin-bottom: 40px; 
            display: grid; 
            grid-template-columns: 200px 1fr; /* Distinct columns for Date/Pub and Title */
            gap: 20px;
            align-items: baseline;
        }

        .writing-meta { 
            font-size: 0.7rem; 
            color: #9C4221; 
            text-transform: uppercase; 
            font-weight: 700; 
            letter-spacing: 1px;
        }

        .writing-title { 
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem; 
            font-weight: 500; 
            color: #1A202C; 
            text-decoration: none; 
            transition: all 0.2s;
            border-bottom: 1px solid transparent;
        }

        .writing-title:hover { 
            color: #9C4221; 
            border-bottom-color: #FBD38D;
        }

        @media (max-width: 768px) {
            nav { padding: 30px 20px; justify-content: center; }
            h1 { text-align: center; margin-bottom: 40px; }
            .writing-entry { grid-template-columns: 1fr; gap: 5px; margin-bottom: 30px; text-align: left; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html" class="active">Popular Writing</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <h1>Popular Writing</h1>

        <article class="writing-entry">
            <div class="writing-meta">The Corner • Mar 2026</div>
            <a href="https://www.openmarketsinstitute.org/publications/the-corner-newsletter-next-railroad-crisis-and-sandeep-vaheesans-electric-essay-march-10th-2026" target="_blank" class="writing-title">Will a Union Pacific-Norfolk Southern Deal Further Wreck U.S. Railroads?</a>
        </article>

        <article class="writing-entry">
            <div class="writing-meta">Washington Monthly • Oct 2024</div>
            <a href="https://washingtonmonthly.com/2024/10/29/train-drain/" target="_blank" class="writing-title">Train Drain (Research Assistance)</a>
        </article>
        
        </main>
</body>
</html>
