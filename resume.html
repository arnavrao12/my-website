<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        :root { --bg: #09090b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc); --border: rgba(255, 255, 255, 0.1); --card-bg: rgba(255, 255, 255, 0.03); }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        body::before, body::after { content: ""; position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.15; pointer-events: none; }
        body::before { top: -100px; left: -100px; background: #38bdf8; }
        body::after { bottom: -100px; right: -100px; background: #c084fc; }

        nav { position: sticky; top: 0; z-index: 100; background: rgba(9, 9, 11, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 20px 0; display: flex; justify-content: center; flex-wrap: wrap; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin: 10px 25px; transition: all 0.3s ease; }
        nav a:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .active { color: #fff; position: relative; }
        .active::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background: var(--accent); border-radius: 2px; }

        main { flex: 1; max-width: 900px; margin: 0 auto; padding: 80px 40px; width: 100%; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 50px; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }
        
        .glass-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 60px 40px; text-align: center; backdrop-filter: blur(10px); }
        .resume-cta { font-size: 1.25rem; color: var(--text-muted); line-height: 1.8; }
        .cta-link { display: inline-block; margin-top: 25px; padding: 14px 32px; background: var(--accent); color: #000; font-weight: 800; border-radius: 30px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
        .cta-link:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(129, 140, 248, 0.4); }

        @media (max-width: 768px) {
            nav { padding: 15px 10px; }
            nav a { margin: 8px 12px; font-size: 0.75rem; }
            main { padding: 40px 20px; text-align: center; }
            h1 { font-size: 2.8rem; }
            .glass-panel { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="resume.html" class="active">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <h1>Resume</h1>
        <div class="glass-panel">
            <p class="resume-cta">For a copy of my resume, please reach out via my contact page.</p>
            <a href="contact.html" class="cta-link">Get in Touch →</a>
        </div>
    </main>
</body>
</html>
