<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        :root { --bg: #f5f5f7; --nav-bg: rgba(255, 255, 255, 0.8); --text-main: #1d1d1f; --text-muted: #6e6e73; --accent-gradient: linear-gradient(135deg, #a7f3d0, #c7d2fe); --accent-solid: #818cf8; --border: rgba(0, 0, 0, 0.05); }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;}
        
        nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 18px 0; display: flex; justify-content: center; flex-wrap: wrap; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin: 8px 20px; transition: all 0.3s ease; }
        nav a:hover { color: var(--text-main); }
        .active { color: var(--text-main) !important; position: relative; }
        .active::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background: var(--accent-gradient); border-radius: 2px; }

        main { flex: 1; max-width: 800px; margin: 0 auto; padding: 60px 40px; width: 100%; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 40px; color: var(--text-main); text-align: left; }
        
        .pastel-panel { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 60px 40px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.01); }
        .resume-cta { font-size: 1.25rem; color: var(--text-muted); line-height: 1.8; font-weight: 400; }
        .cta-link { display: inline-block; margin-top: 25px; padding: 14px 32px; background: var(--accent-gradient); color: var(--text-main); font-weight: 700; border-radius: 30px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
        .cta-link:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(199, 210, 254, 0.5); }

        @media (max-width: 768px) {
            nav { padding: 10px 10px; }
            nav a { margin: 5px 8px; font-size: 0.7rem; }
            main { padding: 40px 20px; text-align: center; }
            h1 { font-size: 2.5rem; margin-bottom: 30px; }
            .pastel-panel { padding: 40px 20px; }
            .resume-cta { font-size: 1rem; }
            .cta-link { font-size: 0.85rem; padding: 12px 28px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="resume.html" class="active">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <h1>Resume</h1>
        <div class="pastel-panel">
            <p class="resume-cta">For a copy of my resume, please reach out via my contact page.</p>
            <a href="contact.html" class="cta-link">Get in Touch →</a>
        </div>
    </main>
</body>
</html>
