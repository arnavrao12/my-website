<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            line-height: 1.7; 
            color: #2D3748; 
            background-color: #FAF9F6; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        /* Consistent Navigation */
        nav { 
            padding: 60px 80px 40px 80px; 
            display: flex; 
            flex-wrap: wrap; 
            border-bottom: 1px solid #E2E8F0; 
        }
        nav a { 
            margin-right: 40px; 
            margin-bottom: 10px; 
            text-decoration: none; 
            color: #718096; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            font-weight: 700; 
            letter-spacing: 1.5px; 
            transition: all 0.3s ease; 
            display: inline-block;
        }
        nav a:hover { color: #9C4221; transform: translateY(-2px); }
        .active { color: #1A202C !important; border-bottom: 2px solid #9C4221; padding-bottom: 8px; }

        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            text-align: center;
        }

        h1 { 
            font-family: 'Lora', serif; 
            font-size: 2.5rem; 
            font-weight: 600; 
            margin-bottom: 20px; 
            color: #1A202C; 
        }

        .resume-cta { 
            font-family: 'Lora', serif; 
            font-size: 1.5rem; 
            color: #4A5568; 
            max-width: 600px;
        }

        .resume-cta a { 
            color: #9C4221; 
            text-decoration: none; 
            font-weight: 600;
            border-bottom: 3px solid #FBD38D; 
            transition: all 0.3s ease;
            display: inline-block;
        }

        .resume-cta a:hover { 
            background: #FBD38D; 
            color: #1A202C;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            nav { padding: 30px 20px; justify-content: center; }
            nav a { margin: 10px; }
            h1 { font-size: 2.2rem; }
            .resume-cta { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="resume.html" class="active">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <h1>Resume</h1>
        <div class="resume-cta">
            <p>For a copy of my resume, please <a href="contact.html">reach out</a>!</p>
        </div>
    </main>
</body>
</html>
