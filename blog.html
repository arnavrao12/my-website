<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        :root { --bg: #f5f5f7; --nav-bg: rgba(255, 255, 255, 0.8); --text-main: #1d1d1f; --text-muted: #6e6e73; --accent-gradient: linear-gradient(135deg, #a7f3d0, #c7d2fe); --accent-solid: #818cf8; --border: rgba(0, 0, 0, 0.05); }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;}
        
        nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 18px 0; display: flex; justify-content: center; flex-wrap: wrap; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin: 8px 20px; transition: all 0.3s ease; }
        nav a:hover { color: var(--text-main); }
        .active { color: var(--text-main) !important; position: relative; }
        .active::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background: var(--accent-gradient); border-radius: 2px; }

        main { flex: 1; max-width: 800px; margin: 0 auto; padding: 60px 40px; width: 100%; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 40px; color: var(--text-main); text-align: left; }
        
        .pastel-panel { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 60px 40px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.01); width: 100%; }
        .blog-desc { font-size: 1.25rem; color: var(--text-muted); line-height: 1.8; max-width: 550px; margin: 0 auto 40px auto; font-weight: 400; }
        
        .embed-container { max-width: 480px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); }
        
        .sub-link { display: block; margin-top: 30px; font-size: 1.05rem; font-weight: 500; color: var(--text-main); }
        .sub-link a { color: var(--accent-solid); text-decoration: none; transition: color 0.2s; }
        .sub-link a:hover { color: var(--text-main); text-decoration: underline; text-underline-offset: 4px; }

        @media (max-width: 768px) {
            nav { padding: 10px 10px; }
            nav a { margin: 5px 8px; font-size: 0.7rem; }
            main { padding: 40px 20px; text-align: center; }
            h1 { font-size: 2.5rem; margin-bottom: 30px; }
            .pastel-panel { padding: 30px 15px; }
            .blog-desc { font-size: 1.05rem; margin-bottom: 30px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="blog.html" class="active">Blog</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <h1>Newsletter</h1>
        <div class="pastel-panel">
            <p class="blog-desc">Subscribe to get my latest analysis on the political economy of the transportation industry delivered straight to your inbox.</p>
            
            <div class="embed-container">
                <iframe src="https://arnavrao.substack.com/embed" width="100%" height="320" style="background:#fff; border: none;" frameborder="0" scrolling="no"></iframe>
            </div>

            <p class="sub-link">Or read the archive at <a href="https://arnavrao.substack.com" target="_blank">arnavrao.substack.com</a></p>
        </div>
    </main>
</body>
</html>
