<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        body { font-family: 'Inter', sans-serif; line-height: 1.7; color: #2D3748; background-color: #E2E8F0; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; animation: fadeIn 0.6s ease-out; }
        
        /* Deep Navy Navigation */
        nav { background-color: #1A202C; padding: 30px 80px; display: flex; flex-wrap: wrap; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        nav a { margin: 10px 25px; text-decoration: none; color: #A0AEC0; text-transform: uppercase; font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px; transition: color 0.3s, transform 0.3s; display: inline-block; }
        .active { color: #FBD38D !important; border-bottom: 2px solid #FBD38D; padding-bottom: 6px; }
        @media (min-width: 769px) { nav a:hover { color: #FFFFFF; transform: translateY(-2px); } }

        /* The 'Card' Layout */
        main { background-color: #FAF9F6; max-width: 1000px; margin: 50px auto; padding: 60px; width: 92%; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); border-radius: 8px; border-top: 5px solid #9C4221; }
        
        .container { display: flex; align-items: center; width: 100%; }
        .content-left { flex: 1.2; padding-right: 60px; }
        
        h1 { font-family: 'Lora', serif; font-size: 2.8rem; font-weight: 600; margin-bottom: 25px; color: #1A202C; text-align: left; }
        .bio { font-size: 1.2rem; color: #4A5568; max-width: 520px; }
        .omi-link { color: #9C4221; text-decoration: none; font-weight: 600; box-shadow: inset 0 -2px 0 #FBD38D; transition: all 0.3s; }
        @media (min-width: 769px) { .omi-link:hover { box-shadow: inset 0 -20px 0 #FBD38D; color: #1A202C; } }
        
        .photo-right { flex: 1; display: flex; justify-content: flex-end; }
        .photo-right img { width: 320px; height: auto; border-radius: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: transform 0.4s ease; }
        @media (min-width: 769px) { .photo-right img:hover { transform: scale(1.02); } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { animation: none; } 
            nav { padding: 20px 10px; }
            nav a { margin: 8px 12px; font-size: 0.7rem; transition: none; transform: none; }
            nav a:hover { color: #FBD38D; }
            main { padding: 40px 25px; margin: 25px auto; width: 95%; }
            .container { flex-direction: column-reverse; text-align: center; }
            .content-left { padding-right: 0; margin-top: 35px; }
            h1 { text-align: center; font-size: 2.2rem; }
            .photo-right img { width: 180px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <div class="container">
            <div class="content-left">
                <h1>Arnav Rao</h1>
                <p class="bio">
                    Hi! Welcome to my website. I am a transportation policy analyst at the 
                    <a href="https://www.openmarketsinstitute.org" target="_blank" class="omi-link">Open Markets Institute</a>, 
                    where I study the political economy of the transportation industry.
                </p>
            </div>
            <div class="photo-right">
                <img src="arnav.jpg" alt="Arnav Rao">
            </div>
        </div>
    </main>
</body>
</html>
