<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        :root { 
            --bg: #f5f5f7; 
            --nav-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1d1d1f; 
            --text-muted: #6e6e73; 
            --accent-gradient: linear-gradient(135deg, #a7f3d0, #c7d2fe); 
            --accent-solid: #818cf8; 
            --border: rgba(0, 0, 0, 0.05); 
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 18px 0; display: flex; justify-content: center; flex-wrap: wrap; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin: 8px 20px; transition: all 0.3s ease; }
        nav a:hover { color: var(--text-main); }
        .active { color: var(--text-main) !important; position: relative; }
        .active::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background: var(--accent-gradient); border-radius: 2px; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; max-width: 1050px; margin: 0 auto; padding: 60px 40px; width: 100%; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .container { display: flex; align-items: center; justify-content: space-between; gap: 50px; width: 100%; }
        .content-left { flex: 1.2; }
        
        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 15px; color: var(--text-main); }
        .bio { font-size: 1.25rem; color: var(--text-muted); max-width: 500px; line-height: 1.6; font-weight: 400; }
        .omi-link { color: var(--accent-solid); text-decoration: none; font-weight: 600; box-shadow: inset 0 -2px 0 #a7f3d0; transition: all 0.2s; }
        .omi-link:hover { color: var(--text-main); box-shadow: inset 0 -20px 0 #a7f3d0; }

        .photo-right { flex: 1; display: flex; justify-content: flex-end; }
        .photo-wrapper { padding: 8px; border-radius: 24px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--border); }
        .photo-right img { display: block; width: 100%; max-width: 320px; border-radius: 18px; filter: contrast(102%); }

        @media (max-width: 768px) {
            nav { padding: 10px 10px; }
            nav a { margin: 5px 8px; font-size: 0.7rem; }
            main { padding: 2vh 20px; } 
            .container { flex-direction: column-reverse; text-align: center; gap: 15px; }
            h1 { font-size: 2.2rem; margin-bottom: 10px; }
            .bio { font-size: 1rem; margin: 0 auto; line-height: 1.5; max-width: 100%; }
            .photo-right { justify-content: center; }
            .photo-wrapper { padding: 5px; border-radius: 16px; }
            .photo-right img { max-width: 130px; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <div class="container">
            <div class="content-left">
                <h1>Arnav Rao</h1>
                <p class="bio">
                    Hi! Welcome to my website. I am a transportation policy analyst at the 
                    <a href="https://www.openmarketsinstitute.org" target="_blank" class="omi-link">Open Markets Institute</a>, 
                    where I study the political economy of the transportation industry.
                </p>
            </div>
            <div class="photo-right">
                <div class="photo-wrapper">
                    <img src="arnav.jpg" alt="Arnav Rao">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
