<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav Rao</title>
    <style>
        /* General Setup */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation - clean and minimalist */
        nav { 
            padding: 40px 60px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        nav a { 
            margin-right: 30px; 
            text-decoration: none; 
            color: #999;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }
        nav a:hover { color: #000; }

        /* Centering the entire content block on the page */
        main {
            flex: 1; /* Fills the remaining vertical space */
            display: flex;
            align-items: center; /* Vertically centers the text and photo */
            justify-content: center; /* Horizontally centers the whole group */
            padding: 0 40px;
        }

        .container {
            display: flex;
            align-items: center;
            max-width: 1000px;
            width: 100%;
        }

        /* Left Side: Text */
        .content-left {
            flex: 1.2;
            padding-right: 60px;
        }

        h1 { 
            font-size: 1.7rem; 
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .bio { 
            font-size: 1.05rem; 
            color: #444;
            max-width: 480px;
        }

        /* The Open Markets Link */
        .omi-link {
            color: #000;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: opacity 0.2s;
        }
        .omi-link:hover {
            opacity: 0.7;
        }

        /* Right Side: Photo */
        .photo-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .photo-placeholder {
            width: 320px;
            height: 420px;
            background: #fcfcfc;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .container {
                flex-direction: column-reverse;
                text-align: center;
            }
            .content-left {
                padding-right: 0;
                margin-top: 40px;
            }
            .photo-right {
                justify-content: center;
            }
            .bio {
                margin: 0 auto;
            }
            nav {
                padding: 30px 20px;
                text-align: center;
            }
            nav a {
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="other-writing.html">Other Writing</a>
        <a href="media.html">Media Mentions</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <div class="container">
            <div class="content-left">
                <h1>Arnav Rao</h1>
                <p class="bio">
                    Hi! Welcome to my website. I am a transportation policy analyst at the 
                    <a href="https://www.openmarketsinstitute.org" target="_blank" class="omi-link">Open Markets Institute</a>, 
                    where I study the political economy of the transportation industry.
                </p>
            </div>

            <div class="photo-right">
    <img src="arnav.jpg" alt="Arnav Rao" style="width: 320px; height: auto; border-radius: 4px;">
</div>
        </div>
    </main>

</body>
</html>
