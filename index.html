<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; line-height: 1.7; color: #2D3748; background-color: #FAF9F6; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { padding: 60px 80px 40px 80px; display: flex; flex-wrap: wrap; border-bottom: 1px solid #E2E8F0; }
        nav a { 
            margin-right: 40px; margin-bottom: 10px; text-decoration: none; color: #718096; 
            text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; 
            transition: all 0.3s ease; display: inline-block;
        }
        nav a:hover { color: #9C4221; transform: translateY(-2px); }
        .active { color: #1A202C !important; border-bottom: 2px solid #9C4221; padding-bottom: 8px; }

        main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 10vh 40px 0 40px; }
        .container { display: flex; align-items: center; max-width: 1100px; width: 100%; }
        .content-left { flex: 1.2; padding-right: 80px; }
        
        h1 { font-family: 'Lora', serif; font-size: 2.8rem; font-weight: 600; margin-bottom: 25px; color: #1A202C; }
        .bio { font-size: 1.2rem; color: #4A5568; max-width: 520px; }
        .omi-link { color: #9C4221; text-decoration: none; font-weight: 600; box-shadow: inset 0 -2px 0 #FBD38D; transition: all 0.3s; }
        .omi-link:hover { box-shadow: inset 0 -20px 0 #FBD38D; color: #1A202C; }
        
        .photo-right { flex: 1; display: flex; justify-content: flex-end; position: relative; }
        .photo-right img { width: 340px; height: auto; border-radius: 2px; transition: transform 0.4s ease; }
        .photo-right img:hover { transform: scale(1.02); }

        @media (max-width: 768px) {
            nav { padding: 30px 20px; justify-content: center; }
            nav a { margin: 10px; }
            main { padding-top: 5vh; }
            .container { flex-direction: column-reverse; text-align: center; }
            .content-left { padding-right: 0; margin-top: 40px; }
            h1 { text-align: center; font-size: 2.2rem; }
            .photo-right img { width: 160px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <div class="container">
            <div class="content-left">
                <h1>Arnav Rao</h1>
                <p class="bio">
                    Hi! Welcome to my website. I am a transportation policy analyst at the 
                    <a href="https://www.openmarketsinstitute.org" target="_blank" class="omi-link">Open Markets Institute</a>, 
                    where I study the political economy of the transportation industry.
                </p>
            </div>
            <div class="photo-right">
                <img src="arnav.jpg" alt="Arnav Rao">
            </div>
        </div>
    </main>
</body>
</html>
