<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav Rao</title>
    <style>
        * { box-sizing: border-box; }
        @keyframes smoothFade { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.5; 
            color: #1d1d1f; 
            background-color: #fbfbfd; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Glassmorphism Navigation */
        nav { 
            position: sticky; top: 0; z-index: 100;
            background-color: rgba(251, 251, 253, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 40px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        nav a { 
            margin: 10px 20px; 
            text-decoration: none; 
            color: #86868b; 
            font-size: 0.85rem; 
            font-weight: 500; 
            letter-spacing: -0.01em; 
            transition: color 0.3s ease; 
        }
        nav a:hover, .active { color: #1d1d1f; }

        main { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 8vh 40px; 
            width: 100%; 
            animation: smoothFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .container { display: flex; align-items: center; justify-content: space-between; max-width: 980px; width: 100%; }
        .content-left { max-width: 55%; padding-right: 40px; }
        
        h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.04em; color: #1d1d1f; }
        .bio { font-size: 1.3rem; color: #86868b; max-width: 500px; font-weight: 400; letter-spacing: -0.015em; line-height: 1.6; }
        
        .omi-link { color: #0066cc; text-decoration: none; transition: opacity 0.2s; }
        @media (min-width: 769px) { .omi-link:hover { text-decoration: underline; } }
        
        .photo-right { max-width: 45%; display: flex; justify-content: flex-end; }
        .photo-right img { width: 100%; max-width: 360px; height: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @media (min-width: 769px) { .photo-right img:hover { transform: scale(1.02); } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            nav { padding: 10px 15px; }
            nav a { margin: 8px 12px; font-size: 0.8rem; }
            main { padding: 40px 20px; align-items: flex-start; }
            .container { flex-direction: column-reverse; text-align: center; }
            .content-left { max-width: 100%; padding-right: 0; margin-top: 40px; }
            h1 { font-size: 2.5rem; margin-bottom: 15px; text-align: center; }
            .bio { font-size: 1.15rem; margin: 0 auto; }
            .photo-right { max-width: 100%; justify-content: center; }
            .photo-right img { width: 220px; border-radius: 16px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <div class="container">
            <div class="content-left">
                <h1>Arnav Rao</h1>
                <p class="bio">
                    Hi! Welcome to my website. I am a transportation policy analyst at the 
                    <a href="https://www.openmarketsinstitute.org" target="_blank" class="omi-link">Open Markets Institute</a>, 
                    where I study the political economy of the transportation industry.
                </p>
            </div>
            <div class="photo-right">
                <img src="arnav.jpg" alt="Arnav Rao">
            </div>
        </div>
    </main>
</body>
</html>
