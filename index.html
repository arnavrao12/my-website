<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav Rao</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; /* Cleaner font */
            line-height: 1.6;
            color: #333;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        nav { 
            padding: 40px 60px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        nav a { 
            margin-right: 25px; 
            text-decoration: none; 
            color: #888; /* Muted color for now */
            text-transform: uppercase;
        }
        nav a:hover { color: #000; }

        /* Main Layout Container */
        .container {
            display: flex;
            flex-wrap: wrap; /* Helps with mobile screens */
            padding: 0 60px;
            margin-top: 5vh; /* Pushes content down slightly */
            max-width: 1100px;
        }

        /* Left side: Text content */
        .content-left {
            flex: 1; /* Takes up half the space */
            min-width: 300px;
            padding-right: 40px;
        }

        /* Right side: Photo placeholder */
        .photo-right {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
        }

        /* Styling the image placeholder */
        .photo-right img {
            max-width: 100%;
            height: auto;
            /* Optional: border-radius: 4px; */
        }

        h1 { 
            font-size: 1.8rem; /* Smaller name */
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .bio { 
            font-size: 1.1rem; 
            color: #444; 
            max-width: 500px; /* Keeps line length readable */
        }

        /* Specifically styling the OMI link */
        .omi-link {
            color: #000 !important; /* Forces it to be black */
            text-decoration: underline;
            font-weight: 500;
        }
        .omi-link:hover {
            color: #555 !important;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="other-writing.html">Other Writing</a>
        <a href="media.html">Media Mentions</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <div class="content-left">
            <h1>Arnav Rao</h1>
            <p class="bio">
                Hi! Welcome to my website. I am a transportation policy analyst at the 
                <a href="https://www.openmarketsinstitute.org" target="_blank" class="omi-link">Open Markets Institute</a>, 
                where I study the political economy of the transportation industry.
            </p>
        </div>

        <div class="photo-right">
            <div style="width: 300px; height: 400px; background: #f9f9f9; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #aaa;">
                Photo Space
            </div>
        </div>
    </div>

</body>
</html>
