<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        :root {
            --bg: #09090b; --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* Ambient Glow Effects */
        body::before, body::after { content: ""; position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.15; pointer-events: none; }
        body::before { top: -100px; left: -100px; background: #38bdf8; }
        body::after { bottom: -100px; right: -100px; background: #c084fc; }

        /* Glass Nav */
        nav { position: sticky; top: 0; z-index: 100; background: rgba(9, 9, 11, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 20px 0; display: flex; justify-content: center; flex-wrap: wrap; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin: 10px 25px; transition: all 0.3s ease; }
        nav a:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .active { color: #fff; position: relative; }
        .active::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background: var(--accent); border-radius: 2px; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; max-width: 1100px; margin: 0 auto; padding: 80px 40px; width: 100%; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .container { display: flex; align-items: center; justify-content: space-between; gap: 60px; width: 100%; }
        .content-left { flex: 1.2; }
        
        h1 { font-size: 4rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 20px; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bio { font-size: 1.25rem; color: var(--text-muted); max-width: 520px; line-height: 1.7; font-weight: 400; }
        .omi-link { color: #fff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.3); transition: all 0.2s; }
        .omi-link:hover { color: #38bdf8; border-bottom-color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }

        .photo-right { flex: 1; display: flex; justify-content: flex-end; }
        .photo-wrapper { padding: 1px; border-radius: 20px; background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05)); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .photo-right img { display: block; width: 100%; max-width: 360px; border-radius: 19px; filter: grayscale(20%) contrast(110%); }

        @media (max-width: 768px) {
            nav { padding: 15px 10px; }
            nav a { margin: 8px 12px; font-size: 0.75rem; }
            .container { flex-direction: column-reverse; text-align: center; gap: 40px; }
            h1 { font-size: 3rem; }
            .bio { margin: 0 auto; }
            .photo-right { justify-content: center; }
            .photo-right img { max-width: 240px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="reports.html">Reports</a>
        <a href="popular-writing.html">Popular Writing</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <div class="container">
            <div class="content-left">
                <h1>Arnav Rao</h1>
                <p class="bio">
                    Hi! Welcome to my website. I am a transportation policy analyst at the 
                    <a href="https://www.openmarketsinstitute.org" target="_blank" class="omi-link">Open Markets Institute</a>, 
                    where I study the political economy of the transportation industry.
                </p>
            </div>
            <div class="photo-right">
                <div class="photo-wrapper">
                    <img src="arnav.jpg" alt="Arnav Rao">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
